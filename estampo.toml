# estampo.toml — Borbon stamp print pipeline
# Run: estampo run --until plate   (3MF only, no Docker needed)
# Run: estampo run                 (full slice + repack, requires Docker + bambox)

[pipeline]
stages = ["load", "arrange", "plate", "slice", "pack"]

[plate]
size = [256, 256]
padding = 5.0

[slicer]
engine = "orca"
version = "2.3.1"
bed_type = "Textured PEI Plate"

[slicer.orca]
printer = "Bambu Lab P1S 0.4 nozzle"
process = "0.08mm Extra Fine @BBL X1C"
# filaments assigned by slot number
[slicer.orca.slots]
1 = "Generic PLA"
2 = "Generic PLA"
3 = "Generic PETG-CF @base"

[slicer.orca.overrides]
sparse_infill_density = "100%"
wall_loops = 3
top_shell_layers = 5
bottom_shell_layers = 4
support_type = "none"

[[parts]]
file = "Borbon_stamp.stl"
copies = 1
orient = "flat"
filament = 3

[pack]
command = "bambox pack {sliced_dir}/plate_1.gcode -o {output_dir}/plate.gcode.3mf -m p1s -f 3:PETG-CF"
output = "{output_dir}/plate.gcode.3mf"
